on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - run: cargo clippy -- -D warnings
      - run: cargo fmt -- --check
      - run: cargo test --lib --tests
      - run: hk check --all

  test-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [test]
    # Run on success or upstream failure but skip when the workflow is cancelled
    # — `always()` would override `cancel-in-progress` and waste a runner.
    if: ${{ !cancelled() }}
    steps:
      - name: Check CI job results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test failed or was skipped"
            exit 1
          fi
          echo "All CI jobs completed successfully"
